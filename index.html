<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4a90a4">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Events - Chavurah</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Vintage Menschen Chavurah</a>
            <nav>
                <a href="index.html" class="active">Upcoming Events</a>
                <a href="past-events.html">Past Events</a>
                <a href="members.html">Members</a>
                <a href="guide.html">Guide</a>
            </nav>
        </div>
    </header>

    <!-- Notification Banner -->
    <div id="notification-banner-container"></div>

    <main>
        <div class="container">
            <!-- Sign-In Section -->
            <div id="member-login-section" class="login-container" style="display: none;">
                <div class="card login-card">
                    <h1>Welcome to Vintage Menschen Chavurah</h1>
                    <p class="text-muted mb-2">Sign in to view events and RSVP</p>
                    <form id="login-form" action="" method="post">
                        <div class="form-group">
                            <label for="login-code">Your Access Code</label>
                            <input type="text" id="login-code" name="password" maxlength="6" placeholder="Enter your code" autocomplete="current-password" autocapitalize="none" autocorrect="off">
                        </div>
                        <div class="form-group remember-me-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="login-remember" checked>
                                <span>Remember me on this device</span>
                            </label>
                        </div>
                        <button type="submit" id="btn-member-login" class="btn btn-primary" style="width: 100%;" disabled>Sign In</button>
                        <p id="member-login-error" class="text-muted mt-2" style="color: var(--error-color); display: none;">
                            Invalid code
                        </p>
                    </form>
                </div>
            </div>

            <!-- Events Section (hidden until signed in) -->
            <div id="events-section" style="display: none;">
                <div class="flex-between mb-2">
                    <div>
                        <h1 class="page-title">Upcoming Events</h1>
                        <p class="page-subtitle">Join us at our next gathering!</p>
                    </div>
                    <div id="member-actions">
                        <span id="welcome-name" class="signed-in-name"></span>
                        <span id="today-date" class="today-date"></span>
                        <button id="btn-create-event" class="btn btn-success">+ New Event</button>
                        <button id="btn-home-sign-out" class="btn btn-secondary btn-sm">Sign Out</button>
                    </div>
                </div>

                <div id="birthdays-section" style="display: none;"></div>

                <div id="events-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading events...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Member Event Modal -->
    <div id="member-event-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="member-event-modal-title">New Event</h2>
                <button class="modal-close" id="member-event-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="member-event-form">
                    <input type="hidden" id="member-event-id">

                    <div class="form-group">
                        <label for="member-event-name">Event Name *</label>
                        <input type="text" id="member-event-name" required placeholder="e.g., Summer BBQ">
                    </div>

                    <div class="form-group">
                        <label for="member-event-status">Event Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="member-event-status" value="Interested" checked>
                                <span>Interested - Gauge interest before confirming</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="member-event-status" value="Upcoming">
                                <span>Upcoming Event - Ready to accept RSVPs</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="member-event-date">Date *</label>
                            <input type="date" id="member-event-date" required>
                        </div>
                        <div class="form-group">
                            <label for="member-event-time">Time</label>
                            <select id="member-event-time">
                                <option value="">Select...</option>
                                <option value="06:00">6:00 AM</option>
                                <option value="06:30">6:30 AM</option>
                                <option value="07:00">7:00 AM</option>
                                <option value="07:30">7:30 AM</option>
                                <option value="08:00">8:00 AM</option>
                                <option value="08:30">8:30 AM</option>
                                <option value="09:00">9:00 AM</option>
                                <option value="09:30">9:30 AM</option>
                                <option value="10:00">10:00 AM</option>
                                <option value="10:30">10:30 AM</option>
                                <option value="11:00">11:00 AM</option>
                                <option value="11:30">11:30 AM</option>
                                <option value="12:00">12:00 PM</option>
                                <option value="12:30">12:30 PM</option>
                                <option value="13:00">1:00 PM</option>
                                <option value="13:30">1:30 PM</option>
                                <option value="14:00">2:00 PM</option>
                                <option value="14:30">2:30 PM</option>
                                <option value="15:00">3:00 PM</option>
                                <option value="15:30">3:30 PM</option>
                                <option value="16:00">4:00 PM</option>
                                <option value="16:30">4:30 PM</option>
                                <option value="17:00">5:00 PM</option>
                                <option value="17:30">5:30 PM</option>
                                <option value="18:00">6:00 PM</option>
                                <option value="18:30">6:30 PM</option>
                                <option value="19:00">7:00 PM</option>
                                <option value="19:30">7:30 PM</option>
                                <option value="20:00">8:00 PM</option>
                                <option value="20:30">8:30 PM</option>
                                <option value="21:00">9:00 PM</option>
                                <option value="21:30">9:30 PM</option>
                                <option value="22:00">10:00 PM</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="member-event-max">Max Attendees</label>
                            <input type="number" id="member-event-max" min="1" placeholder="Unlimited">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="member-event-location-type">Location Type</label>
                        <select id="member-event-location-type">
                            <option value="">Select...</option>
                            <option value="Restaurant">Restaurant</option>
                            <option value="Member's Home">Member's Home</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="member-event-custom-location">Location Name</label>
                        <input type="text" id="member-event-custom-location" placeholder="e.g., John's House, The Blue Cafe">
                    </div>

                    <div class="form-group">
                        <label for="member-event-address">Address</label>
                        <input type="text" id="member-event-address" placeholder="Full address">
                    </div>

                    <div class="form-group">
                        <label for="member-event-description">Description</label>
                        <textarea id="member-event-description" placeholder="Event details, what to bring, etc."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="member-event-modal-cancel">Cancel</button>
                <button type="submit" form="member-event-form" class="btn btn-primary" id="member-event-modal-save">Create Event</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p class="text-center text-muted">&copy; 2026 Vintage Menschen Chavurah</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/airtable.js"></script>
    <script src="js/events.js"></script>
    <script src="js/notifications.js"></script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
}
</script>
</body>
</html>
