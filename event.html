<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4a90a4">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Chavurah">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - Chavurah</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Vintage Menschen Chavurah</a>
            <nav>
                <a href="index.html">Upcoming Events</a>
                <a href="past-events.html">Past Events</a>
                <a href="members.html">Members</a>
                <a href="guide.html">Guide</a>
            </nav>
        </div>
    </header>
    
    <!-- Notification Banner -->
    <div id="notification-banner-container"></div>

    <main>
        <div class="container">
            <div id="event-content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading event details...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Edit Event Modal -->
    <div id="edit-event-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Edit Event</h2>
                <button class="modal-close" id="edit-event-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-event-form">
                    <div class="form-group">
                        <label for="edit-event-name">Event Name *</label>
                        <input type="text" id="edit-event-name" required placeholder="e.g., Summer BBQ">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-event-date">Date *</label>
                            <input type="date" id="edit-event-date" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-event-time">Time</label>
                            <select id="edit-event-time">
                                <option value="">Select...</option>
                                <option value="06:00">6:00 AM</option>
                                <option value="06:30">6:30 AM</option>
                                <option value="07:00">7:00 AM</option>
                                <option value="07:30">7:30 AM</option>
                                <option value="08:00">8:00 AM</option>
                                <option value="08:30">8:30 AM</option>
                                <option value="09:00">9:00 AM</option>
                                <option value="09:30">9:30 AM</option>
                                <option value="10:00">10:00 AM</option>
                                <option value="10:30">10:30 AM</option>
                                <option value="11:00">11:00 AM</option>
                                <option value="11:30">11:30 AM</option>
                                <option value="12:00">12:00 PM</option>
                                <option value="12:30">12:30 PM</option>
                                <option value="13:00">1:00 PM</option>
                                <option value="13:30">1:30 PM</option>
                                <option value="14:00">2:00 PM</option>
                                <option value="14:30">2:30 PM</option>
                                <option value="15:00">3:00 PM</option>
                                <option value="15:30">3:30 PM</option>
                                <option value="16:00">4:00 PM</option>
                                <option value="16:30">4:30 PM</option>
                                <option value="17:00">5:00 PM</option>
                                <option value="17:30">5:30 PM</option>
                                <option value="18:00">6:00 PM</option>
                                <option value="18:30">6:30 PM</option>
                                <option value="19:00">7:00 PM</option>
                                <option value="19:30">7:30 PM</option>
                                <option value="20:00">8:00 PM</option>
                                <option value="20:30">8:30 PM</option>
                                <option value="21:00">9:00 PM</option>
                                <option value="21:30">9:30 PM</option>
                                <option value="22:00">10:00 PM</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-event-max">Max Attendees</label>
                            <input type="number" id="edit-event-max" min="1" placeholder="Unlimited">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="edit-event-location-type">Location Type</label>
                        <select id="edit-event-location-type">
                            <option value="">Select...</option>
                            <option value="Restaurant">Restaurant</option>
                            <option value="Member's Home">Member's Home</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="edit-event-custom-location">Location Name</label>
                        <input type="text" id="edit-event-custom-location" placeholder="e.g., John's House, The Blue Cafe">
                    </div>

                    <div class="form-group">
                        <label for="edit-event-address">Address</label>
                        <input type="text" id="edit-event-address" placeholder="Full address">
                    </div>

                    <div class="form-group">
                        <label for="edit-event-description">Description</label>
                        <textarea id="edit-event-description" placeholder="Event details, what to bring, etc."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="edit-event-modal-cancel">Cancel</button>
                <button type="submit" form="edit-event-form" class="btn btn-primary" id="edit-event-modal-save">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Cancel Event Confirmation Modal -->
    <div id="cancel-event-modal" class="modal-overlay">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Cancel Event</h2>
                <button class="modal-close" id="cancel-event-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to cancel this event?</p>
                <div class="form-group mt-2">
                    <label for="cancel-event-reason">Reason (optional)</label>
                    <input type="text" id="cancel-event-reason" placeholder="e.g., Host is ill, Weather conditions">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancel-event-modal-dismiss">Go Back</button>
                <button type="button" class="btn btn-danger" id="cancel-event-modal-confirm">Cancel Event</button>
            </div>
        </div>
    </div>

    <!-- AI Summary Modal -->
    <div id="ai-summary-modal" class="modal-overlay">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header">
                <h2>AI Discussion Summary</h2>
                <button class="modal-close" id="ai-summary-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="ai-summary-loading" style="display: none;">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Analyzing comments and generating summary...</p>
                    </div>
                </div>
                <div id="ai-summary-content">
                    <div class="form-group">
                        <label for="ai-summary-text">Summary</label>
                        <textarea id="ai-summary-text" rows="6" placeholder="Summary will appear here..."></textarea>
                        <p class="text-muted" style="margin-top: 8px; font-size: 0.875rem;">
                            <span id="ai-summary-meta"></span>
                        </p>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="mark-important">
                            <span>Mark as important announcement</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="email-summary">
                            <span>Email summary to members</span>
                        </label>
                    </div>
                    <div id="email-recipients" style="display: none; margin-left: 24px;">
                        <label class="checkbox-label">
                            <input type="radio" name="recipients" value="rsvp-yes" checked>
                            <span>Members who RSVPed "Yes"</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="radio" name="recipients" value="all-members">
                            <span>All active members</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="ai-summary-modal-cancel">Cancel</button>
                <button type="button" class="btn btn-primary" id="ai-summary-modal-post">Post Summary</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p class="text-center text-muted">&copy; 2026 Vintage Menschen Chavurah</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/airtable.js"></script>
    <script src="js/event-discussion.js"></script>
    <script src="js/event-detail.js"></script>
    <script src="js/notifications.js"></script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
}
</script>
</body>
</html>
